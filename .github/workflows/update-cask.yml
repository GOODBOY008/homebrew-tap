# Auto-update workflow for Homebrew tap
# Place this file in: GOODBOY008/homebrew-tap/.github/workflows/update-cask.yml

name: Update r-shell Cask

on:
  repository_dispatch:
    types: [update-cask]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g., v0.6.0)'
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi

          # If no version was provided, fall back to latest release tag.
          if [ -z "${VERSION}" ]; then
            VERSION="$(curl -fsSL https://api.github.com/repos/GOODBOY008/r-shell/releases/latest | jq -r '.tag_name' | sed 's/^v//')"
          fi

          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "Failed to determine release version"
            exit 1
          fi

          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Updating to version: ${VERSION}"

      - name: Download DMG files and calculate checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="GOODBOY008/r-shell"
          RELEASE_TAG="v${VERSION}"
          
          echo "Resolving DMG assets for release ${RELEASE_TAG}..."

          RELEASE_JSON=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}") || {
            echo "Failed to fetch release metadata for tag ${RELEASE_TAG}"
            exit 1
          }

          AARCH64_URL=$(echo "${RELEASE_JSON}" | jq -r '.assets | map(select(.name | test("^r-shell_.*_aarch64\\.dmg$"))) | .[0].browser_download_url // empty')
          X64_URL=$(echo "${RELEASE_JSON}" | jq -r '.assets | map(select(.name | test("^r-shell_.*_x64\\.dmg$"))) | .[0].browser_download_url // empty')

          if [ -z "${AARCH64_URL}" ] || [ -z "${X64_URL}" ]; then
            echo "Could not find expected DMG assets in release ${RELEASE_TAG}"
            echo "Available assets:"
            echo "${RELEASE_JSON}" | jq -r '.assets[].name'
            exit 1
          fi

          AARCH64_NAME=$(basename "${AARCH64_URL}")
          X64_NAME=$(basename "${X64_URL}")

          AARCH64_VERSION=$(echo "${AARCH64_NAME}" | sed -E 's/^r-shell_([^_]+)_aarch64\.dmg$/\1/')
          X64_VERSION=$(echo "${X64_NAME}" | sed -E 's/^r-shell_([^_]+)_x64\.dmg$/\1/')

          if [ -z "${AARCH64_VERSION}" ] || [ -z "${X64_VERSION}" ]; then
            echo "Failed to parse version from DMG asset names"
            exit 1
          fi

          if [ "${AARCH64_VERSION}" != "${X64_VERSION}" ]; then
            echo "Asset version mismatch between architectures"
            echo "aarch64: ${AARCH64_VERSION}, x64: ${X64_VERSION}"
            exit 1
          fi

          ASSET_VERSION="${AARCH64_VERSION}"
          TAG_VERSION="${VERSION}"
          CASK_VERSION="${ASSET_VERSION},${TAG_VERSION}"

          if [ "${ASSET_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Requested tag version ${TAG_VERSION} differs from asset version ${ASSET_VERSION}; using split cask version"
          fi
          
          # Download Apple Silicon DMG
          echo "Downloading ${AARCH64_NAME}..."
          curl -L -f -o aarch64.dmg "${AARCH64_URL}" || {
            echo "Failed to download aarch64 DMG"
            exit 1
          }
          
          # Download Intel DMG
          echo "Downloading ${X64_NAME}..."
          curl -L -f -o x64.dmg "${X64_URL}" || {
            echo "Failed to download x64 DMG"
            exit 1
          }
          
          # Calculate SHA256 checksums
          echo "Calculating checksums..."
          AARCH64_SHA=$(sha256sum aarch64.dmg | awk '{print $1}')
          X64_SHA=$(sha256sum x64.dmg | awk '{print $1}')
          
          echo "asset_version=${ASSET_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "cask_version=${CASK_VERSION}" >> $GITHUB_OUTPUT
          echo "aarch64_sha=${AARCH64_SHA}" >> $GITHUB_OUTPUT
          echo "x64_sha=${X64_SHA}" >> $GITHUB_OUTPUT
          
          echo "✅ Checksums calculated:"
          echo "  asset version: ${ASSET_VERSION}"
          echo "  tag version: ${TAG_VERSION}"
          echo "  cask version: ${CASK_VERSION}"
          echo "  aarch64: ${AARCH64_SHA}"
          echo "  x64: ${X64_SHA}"

      - name: Update Cask file
        run: |
          VERSION="${{ steps.checksums.outputs.cask_version }}"
          ASSET_VERSION="${{ steps.checksums.outputs.asset_version }}"
          TAG_VERSION="${{ steps.checksums.outputs.tag_version }}"
          AARCH64_SHA="${{ steps.checksums.outputs.aarch64_sha }}"
          X64_SHA="${{ steps.checksums.outputs.x64_sha }}"
          
          cat > Casks/r-shell.rb << EOF
          # Homebrew Cask for r-shell
          # Auto-updated by GitHub Actions
          
          cask "r-shell" do
            version "${TAG_VERSION}"
            
            on_arm do
              sha256 "${AARCH64_SHA}"
              url "https://github.com/GOODBOY008/r-shell/releases/download/v#{TAG_VERSION}/r-shell_#{ASSET_VERSION}_aarch64.dmg"
            end
            
            on_intel do
              sha256 "${X64_SHA}"
              url "https://github.com/GOODBOY008/r-shell/releases/download/v#{TAG_VERSION}/r-shell_#{ASSET_VERSION}_x64.dmg"
            end

            name "r-shell"
            desc "Modern SSH terminal client built with Tauri and React"
            homepage "https://github.com/GOODBOY008/r-shell"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "r-shell.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/r-shell.app"],
                             sudo: false
            end

            # Cleanup user data on uninstall
            zap trash: [
              "~/Library/Application Support/com.aiden.r-shell",
              "~/Library/Caches/com.aiden.r-shell",
              "~/Library/Preferences/com.aiden.r-shell.plist",
              "~/Library/Saved Application State/com.aiden.r-shell.savedState",
              "~/Library/WebKit/com.aiden.r-shell",
            ]
          end
          EOF
          
          echo "✅ Cask file updated"

      - name: Verify cask syntax
        run: |
          # Install Homebrew if not present (for syntax checking)
          if ! command -v brew &> /dev/null; then
            echo "Homebrew not found, skipping syntax check"
            exit 0
          fi
          
          # Audit the cask
          brew audit --cask Casks/r-shell.rb || echo "⚠️  Audit warnings (non-fatal)"

      - name: Commit and push changes
        run: |
          VERSION="${{ steps.checksums.outputs.tag_version }}"
          CASK_VERSION="${{ steps.checksums.outputs.cask_version }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Casks/r-shell.rb
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update r-shell to v${VERSION}

          - cask version: ${{ steps.checksums.outputs.cask_version }}
          - aarch64 SHA256: ${{ steps.checksums.outputs.aarch64_sha }}
          - x64 SHA256: ${{ steps.checksums.outputs.x64_sha }}
          
          Auto-updated by GitHub Actions"
          
          git push
          
          echo "✅ Changes committed and pushed"

      - name: Create summary
        run: |
          VERSION="${{ steps.checksums.outputs.tag_version }}"
          CASK_VERSION="${{ steps.checksums.outputs.cask_version }}"
          ASSET_VERSION="${{ steps.checksums.outputs.asset_version }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ✅ r-shell Cask Updated
          
          **Version:** v${VERSION}
          **Asset Version:** ${ASSET_VERSION}
          **Cask Version:** ${CASK_VERSION}
          
          ## Checksums
          - **Apple Silicon (aarch64):** \`${{ steps.checksums.outputs.aarch64_sha }}\`
          - **Intel (x64):** \`${{ steps.checksums.outputs.x64_sha }}\`
          
          ## Installation
          Users can now install the new version with:
          \`\`\`bash
          brew tap GOODBOY008/tap
          brew install --cask r-shell
          \`\`\`
          
          Or update existing installations:
          \`\`\`bash
          brew upgrade --cask r-shell
          \`\`\`
          EOF
